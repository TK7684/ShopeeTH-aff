<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee Product Commission Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #FF6A00 0%, #FF8C42 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .content {
            padding: 30px;
        }

        .filters {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .filters h2 {
            margin-bottom: 20px;
            color: #333;
            font-size: 1.5em;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 0.9em;
        }

        .filter-group input,
        .filter-group select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: #FF6A00;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FF6A00 0%, #FF8C42 100%);
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 106, 0, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
        }

        .products-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .products-table th {
            background: #FF6A00;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        .products-table td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .products-table tr:hover {
            background: #f8f9fa;
        }

        .products-table img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }

        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .badge-high {
            background: #d4edda;
            color: #155724;
        }

        .badge-medium {
            background: #fff3cd;
            color: #856404;
        }

        .badge-low {
            background: #f8d7da;
            color: #721c24;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .product-link {
            color: #FF6A00;
            text-decoration: none;
            font-weight: 600;
        }

        .product-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛍️ Shopee Product Commission Analyzer</h1>
            <p>Find the best products to promote based on commission rates</p>
        </div>

        <div class="content">
            <div class="filters">
                <h2>🔍 Filters</h2>
                <div class="filter-grid">
                    <div class="filter-group">
                        <label>Min Commission Rate (%)</label>
                        <input type="number" id="minCommissionRate" value="0" min="0" max="100" step="0.1">
                    </div>
                    <div class="filter-group">
                        <label>Max Commission Rate (%)</label>
                        <input type="number" id="maxCommissionRate" value="100" min="0" max="100" step="0.1">
                    </div>
                    <div class="filter-group">
                        <label>Min Price (THB)</label>
                        <input type="number" id="minPrice" value="0" min="0" step="1">
                    </div>
                    <div class="filter-group">
                        <label>Max Price (THB)</label>
                        <input type="number" id="maxPrice" value="" min="0" step="1" placeholder="No limit">
                    </div>
                    <div class="filter-group">
                        <label>Min Seller Commission Rate (%)</label>
                        <input type="number" id="minSellerRate" value="0" min="0" max="100" step="0.1">
                    </div>
                    <div class="filter-group">
                        <label>Sort By</label>
                        <select id="sortBy">
                            <option value="commissionRate">Commission Rate</option>
                            <option value="price">Price</option>
                            <option value="commission">Commission Amount</option>
                            <option value="sales">Sales</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Sort Order</label>
                        <select id="sortOrder">
                            <option value="desc">Descending</option>
                            <option value="asc">Ascending</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Limit Results</label>
                        <input type="number" id="limit" value="100" min="1" max="1000" step="1">
                    </div>
                </div>
                <div class="button-group">
                    <button class="btn-primary" onclick="loadProducts()">📊 Load Products</button>
                    <button class="btn-primary" onclick="applyFilters()">🔍 Apply Filters</button>
                    <button class="btn-secondary" onclick="resetFilters()">🔄 Reset</button>
                </div>
            </div>

            <div id="stats" class="stats" style="display: none;"></div>

            <div id="results"></div>
        </div>
    </div>

    <script>
        let allProducts = [];

        async function loadProducts() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">⏳ Loading products...</div>';

            try {
                const response = await fetch('/api/products');
                if (!response.ok) {
                    throw new Error('Failed to load products');
                }
                allProducts = await response.json();
                resultsDiv.innerHTML = `<div class="loading">✅ Loaded ${allProducts.length} products. Click "Apply Filters" to see results.</div>`;
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">❌ Error: ${error.message}. Make sure you've run "npm run fetch" first.</div>`;
            }
        }

        async function applyFilters() {
            if (allProducts.length === 0) {
                await loadProducts();
                if (allProducts.length === 0) return;
            }

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">⏳ Filtering products...</div>';

            const filters = {
                minCommissionRate: parseFloat(document.getElementById('minCommissionRate').value) || 0,
                maxCommissionRate: parseFloat(document.getElementById('maxCommissionRate').value) || 100,
                minPrice: parseFloat(document.getElementById('minPrice').value) || 0,
                maxPrice: document.getElementById('maxPrice').value ? parseFloat(document.getElementById('maxPrice').value) : Infinity,
                minSellerRate: parseFloat(document.getElementById('minSellerRate').value) || 0,
                sortBy: document.getElementById('sortBy').value,
                sortOrder: document.getElementById('sortOrder').value,
                limit: parseInt(document.getElementById('limit').value) || 100
            };

            try {
                const response = await fetch('/api/filter', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(filters)
                });

                if (!response.ok) {
                    throw new Error('Failed to filter products');
                }

                const data = await response.json();
                displayResults(data);
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }

        function displayResults(data) {
            const { products, stats } = data;
            const resultsDiv = document.getElementById('results');
            const statsDiv = document.getElementById('stats');

            // Display statistics
            statsDiv.style.display = 'grid';
            statsDiv.innerHTML = `
                <div class="stat-card">
                    <h3>Total Matches</h3>
                    <div class="value">${stats.total}</div>
                </div>
                <div class="stat-card">
                    <h3>Avg Commission Rate</h3>
                    <div class="value">${stats.averageCommissionRate}%</div>
                </div>
                <div class="stat-card">
                    <h3>Highest Rate</h3>
                    <div class="value">${stats.highestCommissionRate}%</div>
                </div>
                <div class="stat-card">
                    <h3>Avg Price</h3>
                    <div class="value">${parseFloat(stats.averagePrice).toLocaleString()} ฿</div>
                </div>
            `;

            if (products.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results">No products match your filters. Try adjusting your criteria.</div>';
                return;
            }

            // Display products table
            let html = `
                <h2 style="margin: 30px 0 20px 0;">📦 Products (${products.length})</h2>
                <div style="overflow-x: auto;">
                    <table class="products-table">
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Product Name</th>
                                <th>Commission Rate</th>
                                <th>Seller Rate</th>
                                <th>Shopee Rate</th>
                                <th>Price</th>
                                <th>Commission</th>
                                <th>Sales</th>
                                <th>Link</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            products.forEach(product => {
                const commissionRate = (product.commissionRate || 0) * 100;
                const sellerRate = (product.sellerCommissionRate || 0) * 100;
                const shopeeRate = (product.shopeeCommissionRate || 0) * 100;
                
                let badgeClass = 'badge-low';
                if (commissionRate >= 10) badgeClass = 'badge-high';
                else if (commissionRate >= 5) badgeClass = 'badge-medium';

                html += `
                    <tr>
                        <td><img src="${product.imageUrl || ''}" alt="${product.name}" onerror="this.style.display='none'"></td>
                        <td><strong>${product.name || 'N/A'}</strong></td>
                        <td><span class="badge ${badgeClass}">${commissionRate.toFixed(2)}%</span></td>
                        <td>${sellerRate.toFixed(2)}%</td>
                        <td>${shopeeRate.toFixed(2)}%</td>
                        <td>${(product.price || 0).toLocaleString()} ฿</td>
                        <td>${(product.commission || 0).toLocaleString()} ฿</td>
                        <td>${(product.sales || 0).toLocaleString()}</td>
                        <td><a href="${product.productLink || '#'}" target="_blank" class="product-link">View →</a></td>
                    </tr>
                `;
            });

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            resultsDiv.innerHTML = html;
        }

        function resetFilters() {
            document.getElementById('minCommissionRate').value = 0;
            document.getElementById('maxCommissionRate').value = 100;
            document.getElementById('minPrice').value = 0;
            document.getElementById('maxPrice').value = '';
            document.getElementById('minSellerRate').value = 0;
            document.getElementById('sortBy').value = 'commissionRate';
            document.getElementById('sortOrder').value = 'desc';
            document.getElementById('limit').value = 100;
        }

        // Load products on page load
        window.addEventListener('load', () => {
            loadProducts();
        });
    </script>
</body>
</html>
